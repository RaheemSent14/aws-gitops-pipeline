name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    # Path filter: Changing k8s/ manifests should not trigger an application rebuild.
    # Only changes in the app code trigger this workflow.
    paths:
      - 'app/**'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: "gitops-demo"

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Image Tag
        id: set_tag
        # SHA tags are immutable. "latest" is a moving target that breaks GitOps — 
        # you can never roll back to "latest" because it always points to something new.
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and tag Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set_tag.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./app

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.set_tag.outputs.tag }}'
          format: 'table'
          # Pipeline FAILS (exit-code: 1) if a critical CVE is found.
          exit-code: '1'
          # Don't block builds for vulnerabilities that vendors haven't released a patch for yet.
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          # SecOps: We scan BEFORE push so a vulnerable image never enters our registry. 
          # The registry acts as our source of truth and must remain clean.

      - name: Push image to Amazon ECR
        # This step only executes if the Trivy scan above exits with code 0 (success).
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set_tag.outputs.tag }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "Successfully pushed $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_STEP_SUMMARY

  update-k8s-manifest:
    needs: build-scan-push
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits back to the repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use a PAT or default token with workflow write access
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kubernetes deployment with new image tag
        env:
          IMAGE_TAG: ${{ needs.build-scan-push.outputs.image_tag }}
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          # Use sed to find the image line and replace the tag with the immutable SHA
          sed -i "s|image: .*gitops-demo.*|image: ${ECR_REGISTRY}/gitops-demo:${IMAGE_TAG}|g" k8s/deployment.yaml

      - name: Commit and push changes
        env:
          IMAGE_TAG: ${{ needs.build-scan-push.outputs.image_tag }}
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add k8s/deployment.yaml
          # [skip ci] prevents an infinite loop — without it, this commit would trigger 
          # another pipeline run, which would trigger another commit ad infinitum.
          git commit -m "ci: update image tag to $IMAGE_TAG [skip ci]"
          git push