# external-secret.yaml
# Intent: Automates the synchronization of sensitive data from AWS to Kubernetes.
# Production Context: This manifest ensures that zero-day secrets never touch 
# our Git history, satisfying strict security compliance (e.g., SOC2 or PCI-DSS).

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flask-app-external-secret
  namespace: gitops-demo
spec:
  # SELF-HEALING / ROTATION: The operator re-syncs with AWS every hour. 
  # In a production setting, this allows us to rotate passwords in AWS 
  # Secrets Manager; ESO will automatically update the local K8s Secret 
  # without requiring an engineer to manually run 'kubectl apply'.
  refreshInterval: 1h 

  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore # Points to our global AWS connector.

  target:
    # This is the name of the 'Shadow' Secret the operator will create.
    name: app-config-secret 
    
    # OWNER POLICY: In a production setting, if we delete this ExternalSecret 
    # manifest, the operator will automatically delete the 'app-config-secret' 
    # as well. This prevents "Orphaned Secrets" from cluttering the cluster.
    creationPolicy: Owner
    
  dataFrom:
  - extract:
      # This pulls the entire JSON object from AWS Secrets Manager and 
      # maps the keys (APP_VERSION, ENVIRONMENT) directly into the K8s Secret.
      key: gitops-demo/app-config