# secret-store.yaml
# Intent: Defines the global authentication bridge between Kubernetes and AWS.
# Production Context: We use a 'ClusterSecretStore' instead of a 'SecretStore' 
# so that a single secure connection to AWS can be shared across multiple 
# namespaces, reducing management overhead and the risk of credential leakage.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      # TARGET SERVICE: Points to the AWS Secrets Manager API.
      service: SecretsManager
      region: us-east-1
      auth:
        # AUTHENTICATION STRATEGY:
        # In this local 'kind' environment, we use static IAM Access Keys stored 
        # in a K8s Secret. In a production setting on AWS EKS, we would replace 
        # this with IRSA (IAM Roles for Service Accounts), which uses OIDC 
        # for temporary, short-lived tokens rather than static long-lived keys.
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key-id
            namespace: external-secrets
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
            namespace: external-secrets

# --- SENIOR ENGINEER NOTE: IRSA MIGRATION ---
# When moving to production EKS, the 'auth' block above would be deleted.
# Instead, we would annotate the ESO ServiceAccount with an IAM Role ARN 
# and use the following configuration to eliminate key management entirely:
# auth:
#   jwt:
#     serviceAccountRef:
#       name: external-secrets-sa