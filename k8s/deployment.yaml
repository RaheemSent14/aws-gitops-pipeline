apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: gitops-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      # SecOps / Registry Authentication: This block attaches the cryptographically generated 
      # ECR credential token to the pod's execution context. Because Amazon ECR repositories 
      # are private by default to protect proprietary application binaries, the hosting node's 
      # kubelet agent cannot read or download the image layers without this explicit authentication bridge.
      imagePullSecrets:
        - name: ecr-credentials
      containers:
      - name: flask-app
        # Placeholder image. ArgoCD will patch this dynamically in the future.
        image: 428613119854.dkr.ecr.us-east-1.amazonaws.com/gitops-demo:18145584e1d3596273ddfdc9125482c2bc4661d1
        
        # imagePullPolicy: IfNotPresent tells Kubernetes to check its local cache first.
        # Development Context: This allows our 'kind' cluster to use the image we manually 
        # loaded without attempting to reach out to Docker Hub or ECR. 
        # Production Context: This will be reverted to 'Always' once we migrate to AWS 
        # to ensure ArgoCD forces the cluster to pull the latest verified registry hash.
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 5000
        
        # Resource limits prevent a single container from causing node exhaustion.
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
            
        envFrom:
        - configMapRef:
            name: gitops-demo-config
            
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
          
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10