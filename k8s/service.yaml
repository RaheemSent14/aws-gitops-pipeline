apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: gitops-demo
  # DISCOVERY LAYER: We attach this metadata label to give the Service a clear identity card.
  # The Prometheus operator continuously scans the cluster for Services matching this exact key-value pair, 
  # allowing it to dynamically build its scraping inventory without manual configuration updates.
  labels:
    app: flask-app
spec:
  # Why ClusterIP and not LoadBalancer?
  # A LoadBalancer service type instructs a public cloud provider to provision an external hardware balancer, 
  # which generates unnecessary hourly costs. In our local validation environment, ClusterIP keeps the routing 
  # internal to the cluster network, which perfectly mirrors a secure, cost-optimized backend microservice layer.
  type: ClusterIP
  selector:
    app: flask-app
  ports:
    # INTENT CLARITY: Naming this port 'http' decouples our networking abstraction from raw port numbers.
    # If the backend engineering team shifts the application container from port 5000 to port 8080 down the road, 
    # our monitoring tools won't break because they are pinned to the named pointer 'http' rather than a literal number.
  - name: http
    protocol: TCP
    port: 80
    targetPort: 5000